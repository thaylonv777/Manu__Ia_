name: Artigo diario (Manu.ia)

# Roda todo dia as 09:00 BRT (12:00 UTC). Tambem pode rodar manualmente.
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  gerar-artigo:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gerar o artigo do dia
        id: gerar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: https://www.manuai.com.br
          # Opcional: troque o modelo se quiser. Ex: claude-opus-4-8
          # ANTHROPIC_MODEL: claude-sonnet-4-6
        run: node scripts/gerar-artigo.mjs

      - name: Abrir Pull Request para revisao
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat(blog): novo artigo automatico"
          branch: post-${{ github.run_id }}
          delete-branch: true
          title: "Novo artigo: ${{ steps.gerar.outputs.titulo }}"
          body: |
            Artigo gerado automaticamente pela Manu.ia.

            👀 VER O ARTIGO (preview, bonito):
            https://manu-2-git-post-${{ github.run_id }}-sete7marketingup-2769s-projects.vercel.app/blog/${{ steps.gerar.outputs.slug }}

            (aguarde ~1 min apos abrir o PR para a Vercel terminar o preview)

            Antes de aprovar, confira:
            - Titulo e meta description fazem sentido
            - O texto esta correto e util
            - O CTA do WhatsApp aparece no final

            Aprovar (Merge) publica o artigo.
            Fechar (Close) sem merge descarta.
          labels: |
            blog
            automatico
